services:
  db:
    image: postgres:16-alpine
    container_name: signal-terminal-db
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal_terminal
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal_terminal"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signal-terminal-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: signal-terminal-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://signal:signal@db:5432/signal_terminal
      DATABASE_URL_SYNC: postgresql://signal:signal@db:5432/signal_terminal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  celery-worker:
    build: ./backend
    container_name: signal-terminal-celery-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://signal:signal@db:5432/signal_terminal
      DATABASE_URL_SYNC: postgresql://signal:signal@db:5432/signal_terminal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    container_name: signal-terminal-celery-beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://signal:signal@db:5432/signal_terminal
      DATABASE_URL_SYNC: postgresql://signal:signal@db:5432/signal_terminal
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: signal-terminal-frontend
    ports:
      - "5173:5173"
    environment:
      BACKEND_HOST: backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
